apiVersion: apps/v1
kind: Deployment
metadata:
  name: canary-v1
  namespace: canary-demo
  labels:
    app: canary-demo
    version: v1
spec:
  replicas: 4
  selector:
    matchLabels:
      app: canary-demo
      version: v1
  template:
    metadata:
      labels:
        app: canary-demo
        version: v1
    spec:
      containers:
        - name: canary-v1
          image: hashicorp/http-echo:0.2.3
          args:
            - "-text=Canary deployment version v1"
          ports:
            - containerPort: 5678
