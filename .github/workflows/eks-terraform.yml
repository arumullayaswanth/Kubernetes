name: EKS Terraform

# Show a different workflow run name for PR plan, plan, apply, and destroy.
run-name: >-
  ${{
    github.event_name == 'pull_request'
    && format('EKS Terraform PR Plan #{0}', github.event.pull_request.number)
    || github.event.inputs.action == 'apply'
    && 'EKS Terraform Apply'
    || github.event.inputs.action == 'destroy'
    && 'EKS Terraform Destroy'
    || github.event.inputs.action == 'plan'
    && 'EKS Terraform Plan'
    || 'EKS Terraform'
  }}

# Auto-run only on pull requests. Use workflow_dispatch when you want to run it yourself.
on:
  pull_request:
    paths:
      - "01.EKS-terraform/**"
      - ".github/workflows/eks-terraform.yml"
  workflow_dispatch:
    inputs:
      action:
        description: "Choose what you want to do with the cluster"
        required: true
        default: plan
        type: choice
        options:
          - plan
          - apply
          - destroy
      confirm_destroy:
        description: "Type yes only when you really want to delete the entire cluster"
        required: false
        default: "no"
        type: string

permissions:
  contents: read

# Prevent two runs for the same ref from changing the same infrastructure at the same time.
concurrency:
  group: eks-terraform-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

# Common Terraform settings used by both jobs.
env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  TF_WORKING_DIR: "01.EKS-terraform"
  TF_STATE_KEY: "eks/terraform.tfstate"
  AWS_REGION_VALUE: "us-east-1"

jobs:
  # This job runs automatically for pull requests and only performs validation and plan.
  terraform-plan-pr:
    name: Terraform Plan On PR
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      # Download the repository code into the GitHub runner.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Install the Terraform CLI.
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      # Login to AWS using repository secrets.
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION_VALUE }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Terraform Format Check
        run: terraform fmt -check

      # Initialize Terraform and connect it to the remote S3 backend state file.
      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ env.TF_STATE_KEY }}" \
            -backend-config="region=${{ env.AWS_REGION_VALUE }}" \
            -backend-config="encrypt=true"

      - name: Terraform Validate
        run: terraform validate

      # Show what Terraform will create, update, or delete for this pull request.
      - name: Terraform Plan
        run: terraform plan -no-color

  # This job runs only when you manually start the workflow from GitHub Actions.
  terraform-manual:
    name: Terraform Manual Action
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production

    defaults:
      run:
        shell: bash
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      # Download the repository code into the GitHub runner.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Install the Terraform CLI.
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      # Login to AWS using repository secrets.
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION_VALUE }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      # Add a safety check so destroy works only when you explicitly confirm it.
      - name: Validate destroy confirmation
        if: github.event.inputs.action == 'destroy'
        run: |
          if [ "${{ github.event.inputs.confirm_destroy }}" != "yes" ]; then
            echo "Destroy was selected but confirm_destroy is not set to yes."
            exit 1
          fi

      - name: Terraform Format Check
        run: terraform fmt -check

      # Initialize Terraform and connect it to the remote S3 backend state file.
      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ env.TF_STATE_KEY }}" \
            -backend-config="region=${{ env.AWS_REGION_VALUE }}" \
            -backend-config="encrypt=true"

      - name: Terraform Validate
        run: terraform validate

      # Run only the selected action from the manual workflow input.
      - name: Terraform Plan
        if: github.event.inputs.action == 'plan'
        run: terraform plan -no-color

      - name: Terraform Apply
        if: github.event.inputs.action == 'apply'
        run: terraform apply -auto-approve -no-color

      - name: Cluster Connection Summary
        if: github.event.inputs.action == 'apply'
        run: |
          {
            echo "## How To Connect To Your Cluster After Deployment"
            echo ""
            echo "Your current cluster name in this Terraform is:"
            echo ""
            echo "\`eksprod\`"
            echo ""
            echo "Your current region in this Terraform is:"
            echo ""
            echo "\`us-east-1\`"
            echo ""
            echo "Update kubeconfig:"
            echo ""
            echo "\`\`\`bash"
            echo "aws eks update-kubeconfig --region us-east-1 --name eksprod"
            echo "\`\`\`"
            echo ""
            echo "Check nodes:"
            echo ""
            echo "\`\`\`bash"
            echo "kubectl get nodes"
            echo "\`\`\`"
            echo ""
            echo "Check all pods:"
            echo ""
            echo "\`\`\`bash"
            echo "kubectl get pods -A"
            echo "\`\`\`"
            echo ""
            echo "Check services:"
            echo ""
            echo "\`\`\`bash"
            echo "kubectl get svc -A"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"

      # Before destroy, force cleanup of Kubernetes applications and load balancer resources.
      - name: Pre-Destroy Kubernetes Cleanup
        if: github.event.inputs.action == 'destroy'
        run: |
          CLUSTER_NAME="$(terraform output -raw -no-color cluster_name 2>/dev/null || true)"
          CLUSTER_NAME="$(printf '%s' "${CLUSTER_NAME}" | sed -E 's/\x1b\[[0-9;]*m//g' | tr -d '\r\n')"
          if [ -z "${CLUSTER_NAME}" ]; then
            CLUSTER_NAME="eksprod"
          fi

          CLUSTER_STATUS="$(aws eks describe-cluster --name "${CLUSTER_NAME}" --region "${{ env.AWS_REGION_VALUE }}" --query 'cluster.status' --output text 2>/dev/null || true)"
          if [ -z "${CLUSTER_STATUS}" ]; then
            echo "Cluster ${CLUSTER_NAME} not found. Skipping Kubernetes cleanup."
            exit 0
          fi

          if [ "${CLUSTER_STATUS}" != "ACTIVE" ]; then
            echo "Cluster ${CLUSTER_NAME} status is ${CLUSTER_STATUS}. Skipping Kubernetes cleanup."
            exit 0
          fi

          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl

          aws eks update-kubeconfig --region "${{ env.AWS_REGION_VALUE }}" --name "${CLUSTER_NAME}"

          kubectl get ns || true
          kubectl get svc -A || true
          kubectl get ingress -A || true

          kubectl get svc -A -o jsonpath='{range .items[?(@.spec.type=="LoadBalancer")]}{.metadata.namespace}{" "}{.metadata.name}{"\n"}{end}' > lb-services.txt || true
          kubectl get ingress -A -o jsonpath='{range .items[*]}{.metadata.namespace}{" "}{.metadata.name}{"\n"}{end}' > ingress.txt || true
          kubectl get ns -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}' > namespaces.txt || true

          while read -r NAMESPACE NAME; do
            [ -z "${NAMESPACE}" ] && continue
            kubectl delete ingress "${NAME}" -n "${NAMESPACE}" --ignore-not-found=true || true
          done < ingress.txt

          while read -r NAMESPACE NAME; do
            [ -z "${NAMESPACE}" ] && continue
            kubectl delete svc "${NAME}" -n "${NAMESPACE}" --ignore-not-found=true || true
          done < lb-services.txt

          kubectl delete deployment,statefulset,daemonset,job,cronjob,pod,service,ingress,pvc --all -n default --ignore-not-found=true || true

          while read -r NAMESPACE; do
            [ -z "${NAMESPACE}" ] && continue
            if [ "${NAMESPACE}" = "kube-system" ] || [ "${NAMESPACE}" = "kube-public" ] || [ "${NAMESPACE}" = "kube-node-lease" ] || [ "${NAMESPACE}" = "default" ]; then
              continue
            fi

            kubectl delete namespace "${NAMESPACE}" --ignore-not-found=true --wait=false || true
          done < namespaces.txt

          echo "Waiting for Kubernetes resources, load balancers, and ENIs to start deleting..."
          sleep 180

          {
            echo "## Pre-Destroy Cleanup"
            echo ""
            echo "- Cluster cleaned before Terraform destroy: ${CLUSTER_NAME}"
            echo "- LoadBalancer services, ingresses, default workloads, and non-system namespaces were deleted first"
          } >> "$GITHUB_STEP_SUMMARY"

      # Delete leftover AWS load balancers created by the controller before Terraform destroy.
      - name: Pre-Destroy ALB Cleanup
        if: github.event.inputs.action == 'destroy'
        run: |
          CLUSTER_NAME="$(terraform output -raw -no-color cluster_name 2>/dev/null || true)"
          CLUSTER_NAME="$(printf '%s' "${CLUSTER_NAME}" | sed -E 's/\x1b\[[0-9;]*m//g' | tr -d '\r\n')"
          if [ -z "${CLUSTER_NAME}" ]; then
            CLUSTER_NAME="eksprod"
          fi

          aws resourcegroupstaggingapi get-resources \
            --resource-type-filters "elasticloadbalancing:loadbalancer" \
            --tag-filters "Key=elbv2.k8s.aws/cluster,Values=${CLUSTER_NAME}" \
            --region "${{ env.AWS_REGION_VALUE }}" \
            --query 'ResourceTagMappingList[].ResourceARN' \
            --output text > lb-arns.txt || true

          for ARN in $(cat lb-arns.txt); do
            echo "Deleting load balancer: ${ARN}"
            aws elbv2 delete-load-balancer --load-balancer-arn "${ARN}" --region "${{ env.AWS_REGION_VALUE }}" || true
          done

          aws resourcegroupstaggingapi get-resources \
            --resource-type-filters "elasticloadbalancing:targetgroup" \
            --tag-filters "Key=elbv2.k8s.aws/cluster,Values=${CLUSTER_NAME}" \
            --region "${{ env.AWS_REGION_VALUE }}" \
            --query 'ResourceTagMappingList[].ResourceARN' \
            --output text > tg-arns.txt || true

          for ARN in $(cat tg-arns.txt); do
            echo "Deleting target group: ${ARN}"
            aws elbv2 delete-target-group --target-group-arn "${ARN}" --region "${{ env.AWS_REGION_VALUE }}" || true
          done

          {
            echo "## ALB Cleanup"
            echo ""
            echo "- Deleted load balancers and target groups tagged with elbv2.k8s.aws/cluster=${CLUSTER_NAME}"
          } >> "$GITHUB_STEP_SUMMARY"

      # NAT gateways create ENIs that can block VPC deletion if they linger.
      - name: Pre-Destroy NAT Gateway Cleanup
        if: github.event.inputs.action == 'destroy'
        run: |
          VPC_ID="$(terraform output -raw -no-color vpc_id 2>/dev/null | grep -Eo '^vpc-[0-9a-f]+' | head -n1 || true)"

          if [ -z "${VPC_ID}" ]; then
            VPC_ID="$(terraform state pull 2>/dev/null | jq -r '.resources[] | select(.type=="aws_vpc") | .instances[0].attributes.id' | head -n1 || true)"
          fi

          if [ -z "${VPC_ID}" ]; then
            echo "VPC ID not found. Skipping NAT cleanup."
            exit 0
          fi

          aws ec2 describe-nat-gateways \
            --filter "Name=vpc-id,Values=${VPC_ID}" \
            --region "${{ env.AWS_REGION_VALUE }}" \
            --query 'NatGateways[?State!=`deleted`].NatGatewayId' \
            --output text > nat-ids.txt || true

          for NAT_ID in $(cat nat-ids.txt); do
            echo "Deleting NAT gateway: ${NAT_ID}"
            aws ec2 delete-nat-gateway --nat-gateway-id "${NAT_ID}" --region "${{ env.AWS_REGION_VALUE }}" || true
          done

          if [ -s nat-ids.txt ]; then
            echo "Waiting for NAT gateways to delete..."
            aws ec2 wait nat-gateway-deleted --nat-gateway-ids $(cat nat-ids.txt) --region "${{ env.AWS_REGION_VALUE }}" || true
          fi

          {
            echo "## NAT Cleanup"
            echo ""
            echo "- NAT gateways deleted for VPC ${VPC_ID}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Capture Destroy Subnet IDs
        if: github.event.inputs.action == 'destroy'
        run: |
          terraform output -json private_subnet_ids 2>/dev/null > private-subnet-ids.json || echo '[]' > private-subnet-ids.json
          terraform output -json public_subnet_ids 2>/dev/null > public-subnet-ids.json || echo '[]' > public-subnet-ids.json

          jq -r '.[]' private-subnet-ids.json > subnet-ids.txt || true
          jq -r '.[]' public-subnet-ids.json >> subnet-ids.txt || true

      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        id: terraform_destroy
        continue-on-error: true
        run: terraform destroy -auto-approve -no-color

      - name: Cleanup Available Network Interfaces
        if: github.event.inputs.action == 'destroy' && steps.terraform_destroy.outcome == 'failure'
        run: |
          touch eni-cleanup.txt

          while read -r SUBNET_ID; do
            [ -z "${SUBNET_ID}" ] && continue

            aws ec2 describe-network-interfaces \
              --filters "Name=subnet-id,Values=${SUBNET_ID}" "Name=status,Values=available" \
              --region "${{ env.AWS_REGION_VALUE }}" \
              --query 'NetworkInterfaces[].NetworkInterfaceId' \
              --output text >> eni-cleanup.txt
          done < subnet-ids.txt

          sort -u eni-cleanup.txt -o eni-cleanup.txt

          while read -r ENI_ID; do
            [ -z "${ENI_ID}" ] && continue
            echo "Deleting available ENI: ${ENI_ID}"
            aws ec2 delete-network-interface \
              --network-interface-id "${ENI_ID}" \
              --region "${{ env.AWS_REGION_VALUE }}" || true
          done < eni-cleanup.txt

          ENI_COUNT=$(grep -cve '^\s*$' eni-cleanup.txt || true)

          {
            echo "## Network Interface Cleanup"
            echo ""
            echo "- Available ENIs deleted before destroy retry: ${ENI_COUNT}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Report In-Use ENIs
        if: github.event.inputs.action == 'destroy' && steps.terraform_destroy.outcome == 'failure'
        run: |
          VPC_ID="$(terraform output -raw -no-color vpc_id 2>/dev/null || true)"
          VPC_ID="$(printf '%s' "${VPC_ID}" | sed -E 's/\x1b\[[0-9;]*m//g' | tr -d '\r\n')"

          if [ -z "${VPC_ID}" ]; then
            exit 0
          fi

          aws ec2 describe-network-interfaces \
            --filters "Name=vpc-id,Values=${VPC_ID}" "Name=status,Values=in-use" \
            --region "${{ env.AWS_REGION_VALUE }}" \
            --query 'NetworkInterfaces[].{Id:NetworkInterfaceId,Type:InterfaceType,Attachment:Attachment.InstanceId,Description:Description}' \
            --output table > inuse-enis.txt || true

          {
            echo "## In-Use ENIs"
            echo ""
            echo "These ENIs are still attached and will block VPC deletion:"
            echo ""
            echo "\`\`\`text"
            cat inuse-enis.txt || true
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Terraform Destroy Retry
        if: github.event.inputs.action == 'destroy' && steps.terraform_destroy.outcome == 'failure'
        run: terraform destroy -auto-approve -no-color

      - name: VPC Dependency Report
        if: github.event.inputs.action == 'destroy' && steps.terraform_destroy.outcome == 'failure'
        run: |
          VPC_ID="$(terraform output -raw -no-color vpc_id 2>/dev/null || true)"
          VPC_ID="$(printf '%s' "${VPC_ID}" | sed -E 's/\x1b\[[0-9;]*m//g' | tr -d '\r\n')"

          if [ -z "${VPC_ID}" ]; then
            VPC_ID="$(terraform state pull 2>/dev/null | jq -r '.resources[] | select(.type=="aws_vpc") | .instances[0].attributes.id' | head -n1)"
          fi

          if [ -z "${VPC_ID}" ]; then
            {
              echo "## VPC Dependency Report"
              echo ""
              echo "- Could not determine VPC ID from state."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "Collecting dependency report for VPC ${VPC_ID}..."

          aws ec2 describe-network-interfaces --filters "Name=vpc-id,Values=${VPC_ID}" --region "${{ env.AWS_REGION_VALUE }}" --query 'NetworkInterfaces[].NetworkInterfaceId' --output text > vpc-enis.txt || true
          aws ec2 describe-subnets --filters "Name=vpc-id,Values=${VPC_ID}" --region "${{ env.AWS_REGION_VALUE }}" --query 'Subnets[].SubnetId' --output text > vpc-subnets.txt || true
          aws ec2 describe-route-tables --filters "Name=vpc-id,Values=${VPC_ID}" --region "${{ env.AWS_REGION_VALUE }}" --query 'RouteTables[].RouteTableId' --output text > vpc-rt.txt || true
          aws ec2 describe-security-groups --filters "Name=vpc-id,Values=${VPC_ID}" --region "${{ env.AWS_REGION_VALUE }}" --query 'SecurityGroups[].GroupId' --output text > vpc-sg.txt || true
          aws ec2 describe-internet-gateways --filters "Name=attachment.vpc-id,Values=${VPC_ID}" --region "${{ env.AWS_REGION_VALUE }}" --query 'InternetGateways[].InternetGatewayId' --output text > vpc-igw.txt || true
          aws ec2 describe-nat-gateways --filter "Name=vpc-id,Values=${VPC_ID}" --region "${{ env.AWS_REGION_VALUE }}" --query 'NatGateways[].NatGatewayId' --output text > vpc-nat.txt || true
          aws ec2 describe-vpc-endpoints --filters "Name=vpc-id,Values=${VPC_ID}" --region "${{ env.AWS_REGION_VALUE }}" --query 'VpcEndpoints[].VpcEndpointId' --output text > vpc-endpoints.txt || true
          aws elbv2 describe-load-balancers --region "${{ env.AWS_REGION_VALUE }}" --query "LoadBalancers[?VpcId=='${VPC_ID}'].LoadBalancerArn" --output text > vpc-elbv2.txt || true
          aws elb describe-load-balancers --region "${{ env.AWS_REGION_VALUE }}" --query "LoadBalancerDescriptions[?VPCId=='${VPC_ID}'].LoadBalancerName" --output text > vpc-elb.txt || true

          {
            echo "## VPC Dependency Report"
            echo ""
            echo "- VPC ID: ${VPC_ID}"
            echo "- ENIs: $(wc -w < vpc-enis.txt || echo 0)"
            echo "- Subnets: $(wc -w < vpc-subnets.txt || echo 0)"
            echo "- Route tables: $(wc -w < vpc-rt.txt || echo 0)"
            echo "- Security groups: $(wc -w < vpc-sg.txt || echo 0)"
            echo "- Internet gateways: $(wc -w < vpc-igw.txt || echo 0)"
            echo "- NAT gateways: $(wc -w < vpc-nat.txt || echo 0)"
            echo "- VPC endpoints: $(wc -w < vpc-endpoints.txt || echo 0)"
            echo "- ELBv2 (ALB/NLB): $(wc -w < vpc-elbv2.txt || echo 0)"
            echo "- Classic ELB: $(wc -w < vpc-elb.txt || echo 0)"
            echo ""
            echo "Share this summary if destroy is still blocked."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Destroy Summary
        if: github.event.inputs.action == 'destroy'
        run: |
          {
            echo "## Destroy Summary"
            echo ""
            if [ "${{ steps.terraform_destroy.outcome }}" = "success" ]; then
              echo "- Status: Successfully destroyed all Terraform-managed resources."
              echo "- Note: If any AWS resources were created outside Terraform, they may still exist."
            else
              echo "- Status: Destroy failed."
              echo "- Next step: Share the error output from the failed step so we can fix it."
              echo "- Common blockers:"
              echo "  - Load balancers or ENIs still attached to the VPC"
              echo "  - Security groups still in use"
              echo "  - Kubernetes finalizers on Ingress or Service objects"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
