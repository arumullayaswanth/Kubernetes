name: EKS Terraform

# Show a different workflow run name for PR plan, plan, apply, and destroy.
run-name: >-
  ${{
    github.event_name == 'pull_request'
    && format('EKS Terraform PR Plan #{0}', github.event.pull_request.number)
    || github.event.inputs.action == 'apply'
    && 'EKS Terraform Apply'
    || github.event.inputs.action == 'destroy'
    && 'EKS Terraform Destroy'
    || github.event.inputs.action == 'plan'
    && 'EKS Terraform Plan'
    || 'EKS Terraform'
  }}

# Auto-run only on pull requests. Use workflow_dispatch when you want to run it yourself.
on:
  pull_request:
    paths:
      - "01.EKS-terraform/**"
      - ".github/workflows/eks-terraform.yml"
  workflow_dispatch:
    inputs:
      action:
        description: "Choose what you want to do with the cluster"
        required: true
        default: plan
        type: choice
        options:
          - plan
          - apply
          - destroy
      confirm_destroy:
        description: "Type yes only when you really want to delete the entire cluster"
        required: false
        default: "no"
        type: string

permissions:
  contents: read

# Prevent two runs for the same ref from changing the same infrastructure at the same time.
concurrency:
  group: eks-terraform-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

# Common Terraform settings used by both jobs.
env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  TF_WORKING_DIR: "01.EKS-terraform"
  TF_STATE_KEY: "eks/terraform.tfstate"
  AWS_REGION_VALUE: "us-east-1"

jobs:
  # This job runs automatically for pull requests and only performs validation and plan.
  terraform-plan-pr:
    name: Terraform Plan On PR
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      # Download the repository code into the GitHub runner.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Install the Terraform CLI.
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      # Login to AWS using repository secrets.
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION_VALUE }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Terraform Format Check
        run: terraform fmt -check

      # Initialize Terraform and connect it to the remote S3 backend state file.
      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ env.TF_STATE_KEY }}" \
            -backend-config="region=${{ env.AWS_REGION_VALUE }}" \
            -backend-config="encrypt=true"

      - name: Terraform Validate
        run: terraform validate

      # Show what Terraform will create, update, or delete for this pull request.
      - name: Terraform Plan
        run: terraform plan -no-color

  # This job runs only when you manually start the workflow from GitHub Actions.
  terraform-manual:
    name: Terraform Manual Action
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production

    defaults:
      run:
        shell: bash
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      # Download the repository code into the GitHub runner.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Install the Terraform CLI.
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      # Login to AWS using repository secrets.
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION_VALUE }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      # Add a safety check so destroy works only when you explicitly confirm it.
      - name: Validate destroy confirmation
        if: github.event.inputs.action == 'destroy'
        run: |
          if [ "${{ github.event.inputs.confirm_destroy }}" != "yes" ]; then
            echo "Destroy was selected but confirm_destroy is not set to yes."
            exit 1
          fi

      - name: Terraform Format Check
        run: terraform fmt -check

      # Initialize Terraform and connect it to the remote S3 backend state file.
      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ env.TF_STATE_KEY }}" \
            -backend-config="region=${{ env.AWS_REGION_VALUE }}" \
            -backend-config="encrypt=true"

      - name: Terraform Validate
        run: terraform validate

      # Run only the selected action from the manual workflow input.
      - name: Terraform Plan
        if: github.event.inputs.action == 'plan'
        run: terraform plan -no-color

      - name: Terraform Apply
        if: github.event.inputs.action == 'apply'
        run: terraform apply -auto-approve -no-color

      - name: Install Cluster Autoscaler
        if: github.event.inputs.action == 'apply'
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl

          CLUSTER_NAME=$(terraform output -raw cluster_name)
          CA_ROLE_ARN=$(terraform output -raw cluster_autoscaler_role_arn)

          export CLUSTER_NAME CA_ROLE_ARN
          export AWS_REGION="${{ env.AWS_REGION_VALUE }}"

          bash ./install-autoscaler.sh

      - name: Cluster Connection Summary
        if: github.event.inputs.action == 'apply'
        run: |
          CLUSTER_NAME=$(terraform output -raw cluster_name)
          REGION="${{ env.AWS_REGION_VALUE }}"
          RESOURCE_COUNT=$(terraform show -json | jq '[.values.root_module.resources | length] | add // 0')

          # Connect to cluster for node count
          aws eks update-kubeconfig --region $REGION --name $CLUSTER_NAME 2>/dev/null || true

          # Count real AWS resources created
          EC2_COUNT=$(aws ec2 describe-instances --region $REGION \
            --filters "Name=instance-state-name,Values=running" \
            --query 'Reservations[].Instances[].InstanceId' --output text 2>/dev/null | wc -w || echo "0")
          VOL_COUNT=$(aws ec2 describe-volumes --region $REGION \
            --filters "Name=status,Values=in-use,available" \
            --query 'Volumes[].VolumeId' --output text 2>/dev/null | wc -w || echo "0")
          VOL_TOTAL_GB=$(aws ec2 describe-volumes --region $REGION \
            --filters "Name=status,Values=in-use,available" \
            --query 'Volumes[].Size' --output text 2>/dev/null | tr '\t' '\n' | awk '{sum+=$1} END{print sum+0}')
          EIP_COUNT=$(aws ec2 describe-addresses --region $REGION \
            --query 'Addresses[].AllocationId' --output text 2>/dev/null | wc -w || echo "0")
          NAT_COUNT=$(aws ec2 describe-nat-gateways --region $REGION \
            --filter "Name=state,Values=available" \
            --query 'NatGateways[].NatGatewayId' --output text 2>/dev/null | wc -w || echo "0")
          LB_COUNT=$(aws elbv2 describe-load-balancers --region $REGION \
            --query 'LoadBalancers[].LoadBalancerArn' --output text 2>/dev/null | wc -w || echo "0")
          SG_COUNT=$(aws ec2 describe-security-groups --region $REGION \
            --query "SecurityGroups[?GroupName!='default'].GroupId" --output text 2>/dev/null | wc -w || echo "0")
          SUBNET_COUNT=$(aws ec2 describe-subnets --region $REGION \
            --filters "Name=vpc-id,Values=$(terraform output -raw vpc_id 2>/dev/null || echo 'none')" \
            --query 'Subnets[].SubnetId' --output text 2>/dev/null | wc -w || echo "0")
          NODE_COUNT=$(kubectl get nodes --no-headers 2>/dev/null | wc -l || echo "0")

          # Estimate daily cost
          # t3.medium = $1.01/day, t2.medium = $1.12/day, NAT = $1.08/day, EIP = $0.12/day, EBS = $0.003/GB/day
          DAILY_COST=$(echo "scale=2; ($EC2_COUNT * 1.12) + ($NAT_COUNT * 1.08) + ($EIP_COUNT * 0.12) + ($VOL_TOTAL_GB * 0.003) + ($LB_COUNT * 0.54)" | bc)
          MONTHLY_COST=$(echo "scale=2; $DAILY_COST * 30" | bc)

          {
            echo "## 🎉 Your Kubernetes Cluster Is Ready"
            echo ""
            echo "---"
            echo ""
            echo "### 📊 Resources Created (Real-Time AWS Data)"
            echo ""
            echo "| Resource Type | Count | Details |"
            echo "|---|---|---|"
            echo "| Terraform Resources | ${RESOURCE_COUNT} | Total managed by Terraform |"
            echo "| EC2 Instances | ${EC2_COUNT} | Running instances (nodes + jump box) |"
            echo "| EKS Worker Nodes | ${NODE_COUNT} | In cluster ${CLUSTER_NAME} |"
            echo "| EBS Volumes | ${VOL_COUNT} | Total ${VOL_TOTAL_GB} GB |"
            echo "| Elastic IPs | ${EIP_COUNT} | For NAT Gateway |"
            echo "| NAT Gateways | ${NAT_COUNT} | Private subnet internet access |"
            echo "| Load Balancers | ${LB_COUNT} | ALB/NLB |"
            echo "| Security Groups | ${SG_COUNT} | Non-default SGs |"
            echo "| Subnets | ${SUBNET_COUNT} | In EKS VPC |"
            echo ""
            echo "### 💰 Estimated Cost While Running"
            echo ""
            echo "| Period | Estimated Cost |"
            echo "|---|---|"
            echo "| Per Hour | \$$(echo "scale=2; $DAILY_COST / 24" | bc) |"
            echo "| Per Day | \$${DAILY_COST} |"
            echo "| Per Month (if left running) | \$${MONTHLY_COST} |"
            echo ""
            echo "> ⚠️ **IMPORTANT**: Destroy the cluster when you're done practicing to avoid charges!"
            echo ""
            echo "---"
            echo ""
            echo "### 🔌 Connect To Your Cluster"
            echo ""
            echo "\`\`\`bash"
            echo "aws eks update-kubeconfig --region ${REGION} --name ${CLUSTER_NAME}"
            echo "kubectl get nodes"
            echo "kubectl get pods -A"
            echo "\`\`\`"
            echo ""
            echo "---"
            echo ""
            echo "> When you're done → Run this workflow again with **destroy** + confirm **yes**"
            echo "> Everything will be deleted automatically. Bill becomes \$0."
          } >> "$GITHUB_STEP_SUMMARY"

      # Uninstall Helm releases before destroy so their AWS resources (LBs, etc.) are cleaned up first.
      - name: Pre-Destroy Helm Uninstall
        if: github.event.inputs.action == 'destroy'
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl

          export CLUSTER_NAME=$(terraform output -raw cluster_name 2>/dev/null || echo "eksprod")
          export AWS_REGION="${{ env.AWS_REGION_VALUE }}"

          bash ./uninstall-helm.sh

      # Before destroy, force cleanup of Kubernetes applications and load balancer resources.
      - name: Pre-Destroy Kubernetes Cleanup
        if: github.event.inputs.action == 'destroy'
        run: |
          CLUSTER_NAME=$(terraform output -raw cluster_name 2>/dev/null || echo "eksprod")

          if ! aws eks describe-cluster --name "${CLUSTER_NAME}" --region "${{ env.AWS_REGION_VALUE }}" >/dev/null 2>&1; then
            echo "Cluster ${CLUSTER_NAME} not found. Skipping Kubernetes cleanup."
            exit 0
          fi

          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl

          aws eks update-kubeconfig --region "${{ env.AWS_REGION_VALUE }}" --name "${CLUSTER_NAME}"

          kubectl get ns || true
          kubectl get svc -A || true
          kubectl get ingress -A || true

          kubectl get svc -A -o jsonpath='{range .items[?(@.spec.type=="LoadBalancer")]}{.metadata.namespace}{" "}{.metadata.name}{"\n"}{end}' > lb-services.txt || true
          kubectl get ingress -A -o jsonpath='{range .items[*]}{.metadata.namespace}{" "}{.metadata.name}{"\n"}{end}' > ingress.txt || true
          kubectl get ns -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}' > namespaces.txt || true

          while read -r NAMESPACE NAME; do
            [ -z "${NAMESPACE}" ] && continue
            kubectl delete ingress "${NAME}" -n "${NAMESPACE}" --ignore-not-found=true || true
          done < ingress.txt

          while read -r NAMESPACE NAME; do
            [ -z "${NAMESPACE}" ] && continue
            kubectl delete svc "${NAME}" -n "${NAMESPACE}" --ignore-not-found=true || true
          done < lb-services.txt

          kubectl delete deployment,statefulset,daemonset,job,cronjob,pod,service,ingress,pvc --all -n default --ignore-not-found=true || true

          while read -r NAMESPACE; do
            [ -z "${NAMESPACE}" ] && continue
            if [ "${NAMESPACE}" = "kube-system" ] || [ "${NAMESPACE}" = "kube-public" ] || [ "${NAMESPACE}" = "kube-node-lease" ] || [ "${NAMESPACE}" = "default" ]; then
              continue
            fi

            # Delete PVCs in each namespace BEFORE deleting the namespace
            # PVCs create EBS volumes — if not deleted, volumes become orphaned and keep billing
            kubectl delete pvc --all -n "${NAMESPACE}" --ignore-not-found=true || true
            kubectl delete gateway --all -n "${NAMESPACE}" --ignore-not-found=true || true
            kubectl delete certificate --all -n "${NAMESPACE}" --ignore-not-found=true || true

            kubectl delete namespace "${NAMESPACE}" --ignore-not-found=true --wait=false || true
          done < namespaces.txt

          echo "Waiting for Kubernetes resources, load balancers, and ENIs to start deleting..."
          sleep 180

          {
            echo "## Pre-Destroy Cleanup"
            echo ""
            echo "- Cluster cleaned before Terraform destroy: ${CLUSTER_NAME}"
            echo "- LoadBalancer services, ingresses, default workloads, and non-system namespaces were deleted first"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Capture Destroy Subnet IDs
        if: github.event.inputs.action == 'destroy'
        run: |
          terraform output -json private_subnet_ids > private-subnet-ids.json
          terraform output -json public_subnet_ids > public-subnet-ids.json

          jq -r '.[]' private-subnet-ids.json > subnet-ids.txt
          jq -r '.[]' public-subnet-ids.json >> subnet-ids.txt

          # Capture resource count before destroy
          RESOURCE_COUNT=$(terraform show -json | jq '[.values.root_module.resources | length] | add // 0')
          echo "${RESOURCE_COUNT}" > resource-count.txt
          echo "Resources to destroy: ${RESOURCE_COUNT}"

      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        id: terraform_destroy
        continue-on-error: true
        run: terraform destroy -auto-approve -no-color

      - name: Cleanup Available Network Interfaces
        if: github.event.inputs.action == 'destroy' && steps.terraform_destroy.outcome == 'failure'
        run: |
          touch eni-cleanup.txt

          while read -r SUBNET_ID; do
            [ -z "${SUBNET_ID}" ] && continue

            aws ec2 describe-network-interfaces \
              --filters "Name=subnet-id,Values=${SUBNET_ID}" "Name=status,Values=available" \
              --region "${{ env.AWS_REGION_VALUE }}" \
              --query 'NetworkInterfaces[].NetworkInterfaceId' \
              --output text >> eni-cleanup.txt
          done < subnet-ids.txt

          sort -u eni-cleanup.txt -o eni-cleanup.txt

          while read -r ENI_ID; do
            [ -z "${ENI_ID}" ] && continue
            echo "Deleting available ENI: ${ENI_ID}"
            aws ec2 delete-network-interface \
              --network-interface-id "${ENI_ID}" \
              --region "${{ env.AWS_REGION_VALUE }}" || true
          done < eni-cleanup.txt

          ENI_COUNT=$(grep -cve '^\s*$' eni-cleanup.txt || true)

          {
            echo "## Network Interface Cleanup"
            echo ""
            echo "- Available ENIs deleted before destroy retry: ${ENI_COUNT}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Retry Security Group Cleanup
        if: github.event.inputs.action == 'destroy' && steps.terraform_destroy.outcome == 'failure'
        run: |
          VPC_ID="$(terraform output -raw -no-color vpc_id 2>/dev/null | grep -Eo '^vpc-[0-9a-f]+' | head -n1 || true)"
          if [ -z "${VPC_ID}" ]; then
            VPC_ID="$(terraform state pull 2>/dev/null | jq -r '.resources[] | select(.type=="aws_vpc") | .instances[0].attributes.id' | head -n1 || true)"
          fi

          if [ -z "${VPC_ID}" ]; then
            exit 0
          fi

          aws ec2 describe-security-groups \
            --filters "Name=vpc-id,Values=${VPC_ID}" \
            --region "${{ env.AWS_REGION_VALUE }}" \
            --query "SecurityGroups[?GroupName!='default'].GroupId" \
            --output text > sg-ids.txt || true

          tr '\t' '\n' < sg-ids.txt | while read -r SG_ID; do
            [ -z "${SG_ID}" ] && continue
            echo "Retry deleting security group: ${SG_ID}"
            aws ec2 delete-security-group --group-id "${SG_ID}" --region "${{ env.AWS_REGION_VALUE }}" || true
          done

      - name: Terraform Destroy Retry
        if: github.event.inputs.action == 'destroy' && steps.terraform_destroy.outcome == 'failure'
        run: terraform destroy -auto-approve -no-color

      # ================================================================
      # POST-DESTROY: Nuke all orphaned AWS resources
      # This catches EBS volumes, Elastic IPs, Load Balancers, and
      # snapshots that Kubernetes created outside of Terraform's control.
      # Without this step, these resources keep billing $3-4/day.
      # ================================================================
      - name: Post-Destroy — Delete Orphaned Load Balancers
        if: github.event.inputs.action == 'destroy'
        run: |
          echo "Checking for orphaned Load Balancers..."
          LB_ARNS=$(aws elbv2 describe-load-balancers --region "${{ env.AWS_REGION_VALUE }}" \
            --query 'LoadBalancers[].LoadBalancerArn' --output text 2>/dev/null || echo "")

          if [ -n "$LB_ARNS" ] && [ "$LB_ARNS" != "None" ]; then
            echo "$LB_ARNS" | tr '\t' '\n' | while read -r lb; do
              [ -z "$lb" ] && continue
              echo "  Deleting orphaned LB: $lb"
              aws elbv2 delete-load-balancer --region "${{ env.AWS_REGION_VALUE }}" --load-balancer-arn "$lb" || true
            done
            echo "  Waiting 30s for LBs to drain..."
            sleep 30
            # Delete orphaned Target Groups
            TG_ARNS=$(aws elbv2 describe-target-groups --region "${{ env.AWS_REGION_VALUE }}" \
              --query 'TargetGroups[].TargetGroupArn' --output text 2>/dev/null || echo "")
            if [ -n "$TG_ARNS" ] && [ "$TG_ARNS" != "None" ]; then
              echo "$TG_ARNS" | tr '\t' '\n' | while read -r tg; do
                [ -z "$tg" ] && continue
                aws elbv2 delete-target-group --region "${{ env.AWS_REGION_VALUE }}" --target-group-arn "$tg" || true
              done
            fi
          else
            echo "  None found."
          fi

      - name: Post-Destroy — Delete Orphaned EBS Volumes
        if: github.event.inputs.action == 'destroy'
        run: |
          echo "Checking for orphaned EBS volumes (unattached)..."
          VOLUMES=$(aws ec2 describe-volumes --region "${{ env.AWS_REGION_VALUE }}" \
            --filters "Name=status,Values=available" \
            --query 'Volumes[].[VolumeId,Size]' --output text 2>/dev/null || echo "")

          TOTAL_GB=0
          VOL_COUNT=0
          if [ -n "$VOLUMES" ] && [ "$VOLUMES" != "None" ]; then
            echo "$VOLUMES" | while read -r vol_id size; do
              [ -z "$vol_id" ] && continue
              echo "  Deleting volume: $vol_id (${size}GB)"
              aws ec2 delete-volume --region "${{ env.AWS_REGION_VALUE }}" --volume-id "$vol_id" || true
            done
            VOL_COUNT=$(echo "$VOLUMES" | grep -c "vol-" || echo "0")
            TOTAL_GB=$(echo "$VOLUMES" | awk '{sum+=$2} END{print sum+0}')
            echo "  Deleted $VOL_COUNT volumes ($TOTAL_GB GB) — saving ~\$$(echo "$TOTAL_GB * 10 / 100" | bc)/month"
          else
            echo "  None found."
          fi

      - name: Post-Destroy — Release Orphaned Elastic IPs
        if: github.event.inputs.action == 'destroy'
        run: |
          echo "Checking for orphaned Elastic IPs..."
          EIPS=$(aws ec2 describe-addresses --region "${{ env.AWS_REGION_VALUE }}" \
            --query 'Addresses[].AllocationId' --output text 2>/dev/null || echo "")

          if [ -n "$EIPS" ] && [ "$EIPS" != "None" ]; then
            echo "$EIPS" | tr '\t' '\n' | while read -r eip; do
              [ -z "$eip" ] && continue
              echo "  Releasing EIP: $eip"
              aws ec2 release-address --region "${{ env.AWS_REGION_VALUE }}" --allocation-id "$eip" || true
            done
          else
            echo "  None found."
          fi

      - name: Post-Destroy — Delete NAT Gateways
        if: github.event.inputs.action == 'destroy'
        run: |
          echo "Checking for orphaned NAT Gateways..."
          NATS=$(aws ec2 describe-nat-gateways --region "${{ env.AWS_REGION_VALUE }}" \
            --filter "Name=state,Values=available,pending" \
            --query 'NatGateways[].NatGatewayId' --output text 2>/dev/null || echo "")

          if [ -n "$NATS" ] && [ "$NATS" != "None" ]; then
            echo "$NATS" | tr '\t' '\n' | while read -r nat; do
              [ -z "$nat" ] && continue
              echo "  Deleting NAT Gateway: $nat"
              aws ec2 delete-nat-gateway --region "${{ env.AWS_REGION_VALUE }}" --nat-gateway-id "$nat" || true
            done
            echo "  Waiting 60s for NAT Gateways to delete..."
            sleep 60
          else
            echo "  None found."
          fi

      - name: Post-Destroy — Delete EBS Snapshots
        if: github.event.inputs.action == 'destroy'
        run: |
          echo "Checking for EBS snapshots..."
          SNAPS=$(aws ec2 describe-snapshots --region "${{ env.AWS_REGION_VALUE }}" \
            --owner-ids self \
            --query 'Snapshots[].SnapshotId' --output text 2>/dev/null || echo "")

          if [ -n "$SNAPS" ] && [ "$SNAPS" != "None" ]; then
            echo "$SNAPS" | tr '\t' '\n' | while read -r snap; do
              [ -z "$snap" ] && continue
              echo "  Deleting snapshot: $snap"
              aws ec2 delete-snapshot --region "${{ env.AWS_REGION_VALUE }}" --snapshot-id "$snap" || true
            done
          else
            echo "  None found."
          fi

      - name: Post-Destroy — Delete Orphaned Security Groups
        if: github.event.inputs.action == 'destroy'
        run: |
          echo "Checking for orphaned Security Groups..."
          SGS=$(aws ec2 describe-security-groups --region "${{ env.AWS_REGION_VALUE }}" \
            --query "SecurityGroups[?GroupName!='default'].GroupId" --output text 2>/dev/null || echo "")

          if [ -n "$SGS" ] && [ "$SGS" != "None" ]; then
            # First remove all ingress/egress rules referencing other SGs (dependency loop)
            echo "$SGS" | tr '\t' '\n' | while read -r sg; do
              [ -z "$sg" ] && continue
              aws ec2 revoke-security-group-ingress --region "${{ env.AWS_REGION_VALUE }}" --group-id "$sg" \
                --ip-permissions "$(aws ec2 describe-security-groups --region "${{ env.AWS_REGION_VALUE }}" --group-ids "$sg" --query 'SecurityGroups[0].IpPermissions' --output json 2>/dev/null)" 2>/dev/null || true
              aws ec2 revoke-security-group-egress --region "${{ env.AWS_REGION_VALUE }}" --group-id "$sg" \
                --ip-permissions "$(aws ec2 describe-security-groups --region "${{ env.AWS_REGION_VALUE }}" --group-ids "$sg" --query 'SecurityGroups[0].IpPermissionsEgress' --output json 2>/dev/null)" 2>/dev/null || true
            done
            # Now delete them
            echo "$SGS" | tr '\t' '\n' | while read -r sg; do
              [ -z "$sg" ] && continue
              echo "  Deleting SG: $sg"
              aws ec2 delete-security-group --region "${{ env.AWS_REGION_VALUE }}" --group-id "$sg" || true
            done
          else
            echo "  None found."
          fi

      - name: Post-Destroy — Delete Non-Default VPCs
        if: github.event.inputs.action == 'destroy'
        run: |
          echo "Checking for non-default VPCs..."
          VPCS=$(aws ec2 describe-vpcs --region "${{ env.AWS_REGION_VALUE }}" \
            --query 'Vpcs[?IsDefault==`false`].VpcId' --output text 2>/dev/null || echo "")

          if [ -n "$VPCS" ] && [ "$VPCS" != "None" ]; then
            echo "$VPCS" | tr '\t' '\n' | while read -r vpc; do
              [ -z "$vpc" ] && continue
              echo "  Processing VPC: $vpc"

              # Delete subnets
              aws ec2 describe-subnets --region "${{ env.AWS_REGION_VALUE }}" \
                --filters "Name=vpc-id,Values=$vpc" --query 'Subnets[].SubnetId' --output text 2>/dev/null | \
                tr '\t' '\n' | while read -r sub; do
                  [ -z "$sub" ] && continue
                  aws ec2 delete-subnet --region "${{ env.AWS_REGION_VALUE }}" --subnet-id "$sub" || true
                done

              # Detach and delete internet gateways
              aws ec2 describe-internet-gateways --region "${{ env.AWS_REGION_VALUE }}" \
                --filters "Name=attachment.vpc-id,Values=$vpc" --query 'InternetGateways[].InternetGatewayId' --output text 2>/dev/null | \
                tr '\t' '\n' | while read -r igw; do
                  [ -z "$igw" ] && continue
                  aws ec2 detach-internet-gateway --region "${{ env.AWS_REGION_VALUE }}" --internet-gateway-id "$igw" --vpc-id "$vpc" || true
                  aws ec2 delete-internet-gateway --region "${{ env.AWS_REGION_VALUE }}" --internet-gateway-id "$igw" || true
                done

              # Delete route tables (non-main)
              aws ec2 describe-route-tables --region "${{ env.AWS_REGION_VALUE }}" \
                --filters "Name=vpc-id,Values=$vpc" --query 'RouteTables[?Associations[0].Main!=`true`].RouteTableId' --output text 2>/dev/null | \
                tr '\t' '\n' | while read -r rt; do
                  [ -z "$rt" ] && continue
                  aws ec2 delete-route-table --region "${{ env.AWS_REGION_VALUE }}" --route-table-id "$rt" || true
                done

              # Delete network interfaces
              aws ec2 describe-network-interfaces --region "${{ env.AWS_REGION_VALUE }}" \
                --filters "Name=vpc-id,Values=$vpc" --query 'NetworkInterfaces[].NetworkInterfaceId' --output text 2>/dev/null | \
                tr '\t' '\n' | while read -r eni; do
                  [ -z "$eni" ] && continue
                  aws ec2 delete-network-interface --region "${{ env.AWS_REGION_VALUE }}" --network-interface-id "$eni" || true
                done

              # Delete VPC security groups (non-default)
              aws ec2 describe-security-groups --region "${{ env.AWS_REGION_VALUE }}" \
                --filters "Name=vpc-id,Values=$vpc" --query "SecurityGroups[?GroupName!='default'].GroupId" --output text 2>/dev/null | \
                tr '\t' '\n' | while read -r sg; do
                  [ -z "$sg" ] && continue
                  aws ec2 delete-security-group --region "${{ env.AWS_REGION_VALUE }}" --group-id "$sg" || true
                done

              # Delete VPC
              aws ec2 delete-vpc --region "${{ env.AWS_REGION_VALUE }}" --vpc-id "$vpc" || true
              echo "  Deleted VPC: $vpc"
            done
          else
            echo "  None found."
          fi

      - name: Post-Destroy — Delete CloudWatch Log Groups (EKS)
        if: github.event.inputs.action == 'destroy'
        run: |
          echo "Checking for EKS-related CloudWatch Log Groups..."
          LOG_GROUPS=$(aws logs describe-log-groups --region "${{ env.AWS_REGION_VALUE }}" \
            --log-group-name-prefix "/aws/eks" \
            --query 'logGroups[].logGroupName' --output text 2>/dev/null || echo "")

          if [ -n "$LOG_GROUPS" ] && [ "$LOG_GROUPS" != "None" ]; then
            echo "$LOG_GROUPS" | tr '\t' '\n' | while read -r lg; do
              [ -z "$lg" ] && continue
              echo "  Deleting log group: $lg"
              aws logs delete-log-group --region "${{ env.AWS_REGION_VALUE }}" --log-group-name "$lg" || true
            done
          else
            echo "  None found."
          fi

          # Also delete ALB controller log groups
          ALB_LOGS=$(aws logs describe-log-groups --region "${{ env.AWS_REGION_VALUE }}" \
            --log-group-name-prefix "/aws/elb" \
            --query 'logGroups[].logGroupName' --output text 2>/dev/null || echo "")

          if [ -n "$ALB_LOGS" ] && [ "$ALB_LOGS" != "None" ]; then
            echo "$ALB_LOGS" | tr '\t' '\n' | while read -r lg; do
              [ -z "$lg" ] && continue
              echo "  Deleting log group: $lg"
              aws logs delete-log-group --region "${{ env.AWS_REGION_VALUE }}" --log-group-name "$lg" || true
            done
          fi

      - name: Post-Destroy — Final Verification
        if: github.event.inputs.action == 'destroy'
        run: |
          echo "=============================================="
          echo "FINAL VERIFICATION — Checking for remaining billable resources"
          echo "=============================================="

          echo ""
          echo "--- EC2 Instances ---"
          aws ec2 describe-instances --region "${{ env.AWS_REGION_VALUE }}" \
            --filters "Name=instance-state-name,Values=running,stopped" \
            --query 'Reservations[].Instances[].[InstanceId,InstanceType,State.Name]' --output table 2>/dev/null || echo "None"

          echo ""
          echo "--- EBS Volumes ---"
          aws ec2 describe-volumes --region "${{ env.AWS_REGION_VALUE }}" \
            --query 'Volumes[].[VolumeId,Size,State]' --output table 2>/dev/null || echo "None"

          echo ""
          echo "--- Elastic IPs ---"
          aws ec2 describe-addresses --region "${{ env.AWS_REGION_VALUE }}" \
            --query 'Addresses[].[PublicIp,AllocationId,AssociationId]' --output table 2>/dev/null || echo "None"

          echo ""
          echo "--- NAT Gateways ---"
          aws ec2 describe-nat-gateways --region "${{ env.AWS_REGION_VALUE }}" \
            --filter "Name=state,Values=available,pending" \
            --query 'NatGateways[].[NatGatewayId,State]' --output table 2>/dev/null || echo "None"

          echo ""
          echo "--- Load Balancers ---"
          aws elbv2 describe-load-balancers --region "${{ env.AWS_REGION_VALUE }}" \
            --query 'LoadBalancers[].[LoadBalancerName,State.Code]' --output table 2>/dev/null || echo "None"

          echo ""
          echo "--- EKS Clusters ---"
          aws eks list-clusters --region "${{ env.AWS_REGION_VALUE }}" --output text 2>/dev/null || echo "None"

          echo ""
          echo "--- Non-Default VPCs ---"
          aws ec2 describe-vpcs --region "${{ env.AWS_REGION_VALUE }}" \
            --query 'Vpcs[?IsDefault==`false`].[VpcId,CidrBlock]' --output table 2>/dev/null || echo "None"

          echo ""
          echo "--- EBS Snapshots ---"
          aws ec2 describe-snapshots --region "${{ env.AWS_REGION_VALUE }}" --owner-ids self \
            --query 'Snapshots[].[SnapshotId,VolumeSize]' --output table 2>/dev/null || echo "None"

          echo ""
          echo "=============================================="
          echo "If all tables above show 'None' or empty — your bill is $0"
          echo "=============================================="

      - name: Destroy Summary
        if: github.event.inputs.action == 'destroy'
        run: |
          REGION="${{ env.AWS_REGION_VALUE }}"
          RESOURCE_COUNT=$(cat resource-count.txt 2>/dev/null || echo "0")

          # Count what's STILL remaining (should all be 0)
          REMAINING_EC2=$(aws ec2 describe-instances --region $REGION \
            --filters "Name=instance-state-name,Values=running,stopped" \
            --query 'Reservations[].Instances[].InstanceId' --output text 2>/dev/null | wc -w || echo "0")
          REMAINING_VOLS=$(aws ec2 describe-volumes --region $REGION \
            --query 'Volumes[].VolumeId' --output text 2>/dev/null | wc -w || echo "0")
          REMAINING_EIPS=$(aws ec2 describe-addresses --region $REGION \
            --query 'Addresses[].AllocationId' --output text 2>/dev/null | wc -w || echo "0")
          REMAINING_NATS=$(aws ec2 describe-nat-gateways --region $REGION \
            --filter "Name=state,Values=available,pending" \
            --query 'NatGateways[].NatGatewayId' --output text 2>/dev/null | wc -w || echo "0")
          REMAINING_LBS=$(aws elbv2 describe-load-balancers --region $REGION \
            --query 'LoadBalancers[].LoadBalancerArn' --output text 2>/dev/null | wc -w || echo "0")
          REMAINING_VPCS=$(aws ec2 describe-vpcs --region $REGION \
            --query 'Vpcs[?IsDefault==`false`].VpcId' --output text 2>/dev/null | wc -w || echo "0")
          REMAINING_SNAPS=$(aws ec2 describe-snapshots --region $REGION --owner-ids self \
            --query 'Snapshots[].SnapshotId' --output text 2>/dev/null | wc -w || echo "0")
          REMAINING_EKS=$(aws eks list-clusters --region $REGION \
            --query 'clusters' --output text 2>/dev/null | wc -w || echo "0")

          TOTAL_REMAINING=$((REMAINING_EC2 + REMAINING_VOLS + REMAINING_EIPS + REMAINING_NATS + REMAINING_LBS + REMAINING_VPCS + REMAINING_SNAPS + REMAINING_EKS))

          if [ "$TOTAL_REMAINING" -eq 0 ]; then
            BILL_STATUS="✅ **Your daily AWS bill is now \$0.** Nothing billable remains."
          else
            BILL_STATUS="⚠️ **Some resources still remain (${TOTAL_REMAINING} total).** Check the verification step above for details."
          fi

          {
            echo "## 🗑️ Infrastructure Destroyed — Real-Time Status"
            echo ""
            echo "**Terraform resources destroyed: ${RESOURCE_COUNT}**"
            echo ""
            echo "---"
            echo ""
            echo "### 📊 Remaining AWS Resources After Destroy (Real-Time Check)"
            echo ""
            echo "| Resource Type | Remaining | Status |"
            echo "|---|---|---|"
            echo "| EC2 Instances | ${REMAINING_EC2} | $([ $REMAINING_EC2 -eq 0 ] && echo '✅ Clean' || echo '❌ Still running') |"
            echo "| EBS Volumes | ${REMAINING_VOLS} | $([ $REMAINING_VOLS -eq 0 ] && echo '✅ Clean' || echo '❌ Still exists') |"
            echo "| Elastic IPs | ${REMAINING_EIPS} | $([ $REMAINING_EIPS -eq 0 ] && echo '✅ Clean' || echo '❌ Still allocated') |"
            echo "| NAT Gateways | ${REMAINING_NATS} | $([ $REMAINING_NATS -eq 0 ] && echo '✅ Clean' || echo '❌ Still running') |"
            echo "| Load Balancers | ${REMAINING_LBS} | $([ $REMAINING_LBS -eq 0 ] && echo '✅ Clean' || echo '❌ Still running') |"
            echo "| Non-Default VPCs | ${REMAINING_VPCS} | $([ $REMAINING_VPCS -eq 0 ] && echo '✅ Clean' || echo '❌ Still exists') |"
            echo "| EBS Snapshots | ${REMAINING_SNAPS} | $([ $REMAINING_SNAPS -eq 0 ] && echo '✅ Clean' || echo '❌ Still exists') |"
            echo "| EKS Clusters | ${REMAINING_EKS} | $([ $REMAINING_EKS -eq 0 ] && echo '✅ Clean' || echo '❌ Still running') |"
            echo ""
            echo "---"
            echo ""
            echo "### 💰 Billing Status"
            echo ""
            echo "${BILL_STATUS}"
            echo ""
            echo "---"
            echo ""
            echo "> The S3 state bucket still exists (needed for next apply). It costs < \$0.01/month."
            echo "> To recreate everything: Run this workflow → select **apply**."
          } >> "$GITHUB_STEP_SUMMARY"
