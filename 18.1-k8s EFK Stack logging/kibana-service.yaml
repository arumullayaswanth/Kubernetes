apiVersion: v1
kind: Service
metadata:
  name: kibana
  namespace: kube-logging
  labels:
    app: kibana
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing  

spec:
  type: LoadBalancer
  
  selector:
    app: kibana
    
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5601
