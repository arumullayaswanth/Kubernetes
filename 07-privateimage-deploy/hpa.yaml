apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: private-app-hpa
  namespace: private-app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: private-app
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70
