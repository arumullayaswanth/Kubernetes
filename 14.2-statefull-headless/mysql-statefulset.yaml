apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
spec:
  serviceName: mysql
  replicas: 3

  selector:
    matchLabels:
      app: mysql

  template:
    metadata:
      labels:
        app: mysql

    spec:
      containers:
      - name: mysql
        image: mysql:8.0

        ports:
        - containerPort: 3306

        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: MYSQL_ROOT_PASSWORD

        # ✅ Inject pod name directly
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name

        command:
        - sh
        - -c
        - |
          echo "Setting unique server-id..."

          ORDINAL=$(echo $POD_NAME | awk -F'-' '{print $NF}')
          SERVER_ID=$((100 + ORDINAL))

          echo "[mysqld]" > /etc/mysql/conf.d/server-id.cnf
          echo "server-id=${SERVER_ID}" >> /etc/mysql/conf.d/server-id.cnf
          echo "log-bin=mysql-bin" >> /etc/mysql/conf.d/server-id.cnf
          echo "binlog-format=ROW" >> /etc/mysql/conf.d/server-id.cnf

          echo "Pod: $POD_NAME"
          echo "Server ID: $SERVER_ID"

          exec docker-entrypoint.sh mysqld

        volumeMounts:
        - name: mysql-data
          mountPath: /var/lib/mysql

        readinessProbe:
          exec:
            command: ["mysqladmin", "ping", "-h", "127.0.0.1"]
          initialDelaySeconds: 10

        livenessProbe:
          exec:
            command: ["mysqladmin", "ping", "-h", "127.0.0.1"]
          initialDelaySeconds: 30

  volumeClaimTemplates:
  - metadata:
      name: mysql-data
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: gp2
      resources:
        requests:
          storage: 5Gi
