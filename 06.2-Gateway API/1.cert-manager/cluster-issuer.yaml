apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    # Let's Encrypt production server — issues real trusted certificates
    server: https://acme-v02.api.letsencrypt.org/directory
    # ---------------------------------------------------------------
    # REPLACE with your real email address
    # Let's Encrypt sends certificate expiry warnings to this email
    # The email yaswanth.arumulla@gmail.com is only used for:
    # Expiry warning emails from Let's Encrypt
    # ---------------------------------------------------------------
    email: yaswanth.arumulla@gmail.com
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
      - http01:
          gatewayHTTPRoute:
            parentRefs:
              - name: paytam-gateway
                namespace: paytam
                kind: Gateway
