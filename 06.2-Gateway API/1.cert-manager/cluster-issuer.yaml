apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: yaswanth.arumulla@gmail.com
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
      # Each solver has a label selector — cert-manager picks the solver
      # whose selector matches the labels on the Certificate resource.
      # This guarantees deterministic solver selection with no namespace mismatch.

      - selector:
          matchLabels:
            solver: paytam
        http01:
          gatewayHTTPRoute:
            parentRefs:
              - group: gateway.networking.k8s.io
                kind: Gateway
                name: paytam-gateway
                namespace: paytam

      - selector:
          matchLabels:
            solver: url-rewrite
        http01:
          gatewayHTTPRoute:
            parentRefs:
              - group: gateway.networking.k8s.io
                kind: Gateway
                name: url-rewrite-gateway
                namespace: url-rewrite

      - selector:
          matchLabels:
            solver: weighted
        http01:
          gatewayHTTPRoute:
            parentRefs:
              - group: gateway.networking.k8s.io
                kind: Gateway
                name: weighted-gateway
                namespace: weighted

      - selector:
          matchLabels:
            solver: traffic
        http01:
          gatewayHTTPRoute:
            parentRefs:
              - group: gateway.networking.k8s.io
                kind: Gateway
                name: traffic-gateway
                namespace: traffic-splitting
