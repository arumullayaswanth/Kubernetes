apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: paytam-weighted
  namespace: weighted
  labels:
    app: paytam
spec:
  parentRefs:
    - name: weighted-gateway
      namespace: weighted
  hostnames:
    - weighted.tagent.cfd
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        # No weight specified — Kubernetes splits 50/50 automatically
        - name: paytam-svc-v1
          port: 80
        - name: paytam-svc-v2
          port: 80
