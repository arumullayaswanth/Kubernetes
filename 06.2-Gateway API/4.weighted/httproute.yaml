apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: paytam-weighted
  namespace: weighted
  labels:
    app: paytam
spec:
  parentRefs:
    - name: paytam-gateway
      namespace: weighted
  # REPLACE with your real domain
  hostnames:
    - YOUR_SUBDOMAIN.YOUR_DOMAIN.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        # No weight mentioned — Kubernetes automatically splits 50/50
        - name: paytam-svc-v1
          port: 80
        - name: paytam-svc-v2
          port: 80
