apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: cert-manager-tls
  namespace: paytam
spec:
  secretName: cert-manager-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  # ---------------------------------------------------------------
  # REPLACE with your real domain
  # Example: paytam.aluru.com
  # ---------------------------------------------------------------
  dnsNames:
    - tagent.cfd
