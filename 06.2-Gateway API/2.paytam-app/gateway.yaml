apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: paytam-gateway
  namespace: paytam
spec:
  gatewayClassName: gateway-api
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
    - name: https
      protocol: HTTPS
      port: 443
      allowedRoutes:
        namespaces:
          from: Same
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: paytam-tls
            namespace: paytam
