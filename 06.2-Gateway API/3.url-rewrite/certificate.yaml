apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: url-rewrite-cert
  namespace: url-rewrite
  labels:
    # Must match the selector in ClusterIssuer solver for url-rewrite
    solver: url-rewrite
spec:
  secretName: url-rewrite-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - url-rewrite.tagent.cfd
