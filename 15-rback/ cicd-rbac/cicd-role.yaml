apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: dev-app
  name: cicd-deployer-role
rules:
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get","list","create","update","patch"]

- apiGroups: [""]
  resources: ["pods","services"]
  verbs: ["get","list","watch"]
