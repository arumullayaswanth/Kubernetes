apiVersion: apps/v1
kind: Deployment
metadata:
  name: paytam-app
  namespace: dev
spec:
  replicas: 2
  selector:
    matchLabels:
      app: paytam
  template:
    metadata:
      labels:
        app: paytam
    spec:
      containers:
      - name: paytam-container
        image: yaswanth111/paytam:latest
        ports:
        - containerPort: 80
