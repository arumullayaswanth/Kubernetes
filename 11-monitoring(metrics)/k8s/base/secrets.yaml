apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: devops-demo
type: Opaque
stringData:
  POSTGRES_USER: app_user
  POSTGRES_PASSWORD: app_password
  GRAFANA_ADMIN_PASSWORD: admin123
  SLACK_WEBHOOK_URL: https://hooks.slack.com/services/XXXXX
  DATABASE_URL_NODE: postgresql://app_user:app_password@postgres:5432/devops_demo
  DATABASE_URL_PYTHON: postgresql+psycopg://app_user:app_password@postgres:5432/devops_demo
  DATABASE_URL_GO: postgres://app_user:app_password@postgres:5432/devops_demo
