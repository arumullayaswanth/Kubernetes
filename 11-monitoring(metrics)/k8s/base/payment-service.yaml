apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: devops-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
        - name: payment-service
          # CHANGE THIS: Replace with your ECR image URL
          # image: <ACCOUNT_ID>.dkr.ecr.us-east-1.amazonaws.com/devops-demo/payment-service:latest
          image: 713939171080.dkr.ecr.us-east-1.amazonaws.com/devops-demo/payment-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SERVICE_NAME
              value: payment-service
            - name: APP_ENV
              value: production
            - name: PORT
              value: "8080"
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: LOG_LEVEL
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_DB)
            - name: REQUEST_TIMEOUT
              value: 3s
            - name: GATEWAY_TIMEOUT
              value: 1500ms
            - name: MAX_RETRIES
              value: "3"
            - name: CIRCUIT_BREAKER_NAME
              value: payment-gateway
            - name: GATEWAY_FAILURE_RATIO
              value: "0.3"
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: devops-demo
spec:
  selector:
    app: payment-service
  ports:
    - name: http
      port: 8080
      targetPort: 8080
