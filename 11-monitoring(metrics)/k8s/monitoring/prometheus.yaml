apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: devops-demo
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    alerting:
      alertmanagers:
        - static_configs:
            - targets:
                - alertmanager:9093

    rule_files:
      - /etc/prometheus/alerts.yml

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ["prometheus:9090"]

      - job_name: user-service
        metrics_path: /metrics
        static_configs:
          - targets: ["user-service:3000"]
            labels:
              service: user-service

      - job_name: order-service
        metrics_path: /metrics
        static_configs:
          - targets: ["order-service:8000"]
            labels:
              service: order-service

      - job_name: payment-service
        metrics_path: /metrics
        static_configs:
          - targets: ["payment-service:8080"]
            labels:
              service: payment-service
  alerts.yml: |
    groups:
      - name: microservices.rules
        rules:
          - alert: HighErrorRate
            expr: |
              (
                sum(rate(http_requests_total{service=~"user-service|order-service|payment-service",status_code=~"5.."}[5m])) by (service)
                /
                sum(rate(http_requests_total{service=~"user-service|order-service|payment-service"}[5m])) by (service)
              ) > 0.05
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "High error rate on {{ $labels.service }}"
              description: "5xx responses exceeded 5% for service {{ $labels.service }} in the last 5 minutes."

          - alert: HighLatencyP95
            expr: |
              histogram_quantile(
                0.95,
                sum(rate(http_request_duration_seconds_bucket{service=~"user-service|order-service|payment-service"}[5m])) by (le, service)
              ) > 1
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High p95 latency on {{ $labels.service }}"
              description: "95th percentile latency is above 1 second for service {{ $labels.service }}."

          - alert: PodRestartDetected
            expr: changes(process_start_time_seconds{service=~"user-service|order-service|payment-service"}[15m]) > 0
            for: 1m
            labels:
              severity: warning
            annotations:
              summary: "Process restart detected for {{ $labels.service }}"
              description: "The service process restarted within the last 15 minutes."

          - alert: HighCPUUsage
            expr: |
              (
                (
                  sum(rate(process_cpu_seconds_total{service=~"user-service|order-service|payment-service"}[5m])) by (service)
                  or
                  sum(rate(process_cpu_user_seconds_total{service=~"user-service|order-service|payment-service"}[5m]) + rate(process_cpu_system_seconds_total{service=~"user-service|order-service|payment-service"}[5m])) by (service)
                ) * 100
              ) > 80
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "CPU usage above 80% for {{ $labels.service }}"
              description: "CPU consumption stayed above 80% of one core for service {{ $labels.service }}."
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: devops-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.55.0
          imagePullPolicy: IfNotPresent
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
          ports:
            - containerPort: 9090
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9090
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
            - name: prometheus-config
              mountPath: /etc/prometheus/alerts.yml
              subPath: alerts.yml
            - name: prometheus-data
              mountPath: /prometheus
      volumes:
        - name: prometheus-config
          configMap:
            name: prometheus-config
        - name: prometheus-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: devops-demo
spec:
  selector:
    app: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: 9090
