apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: devops-demo
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    alerting:
      alertmanagers:
        - static_configs:
            - targets:
                - alertmanager:9093

    rule_files:
      - /etc/prometheus/alerts.yml

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ["prometheus:9090"]

      - job_name: user-service
        metrics_path: /metrics
        static_configs:
          - targets: ["user-service:3000"]
            labels:
              service: user-service

      - job_name: order-service
        metrics_path: /metrics
        static_configs:
          - targets: ["order-service:8000"]
            labels:
              service: order-service

      - job_name: payment-service
        metrics_path: /metrics
        static_configs:
          - targets: ["payment-service:8080"]
            labels:
              service: payment-service

      # --- Kubernetes Infrastructure Monitoring ---

      - job_name: kube-state-metrics
        static_configs:
          - targets: ["kube-state-metrics.kube-system.svc.cluster.local:8080"]

      - job_name: node-exporter
        static_configs:
          - targets: ["node-exporter.kube-system.svc.cluster.local:9100"]

      - job_name: kubernetes-nodes-cadvisor
        scheme: https
        tls_config:
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/$1/proxy/metrics/cadvisor

      - job_name: kubernetes-apiservers
        scheme: https
        tls_config:
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: endpoints
        relabel_configs:
          - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
            action: keep
            regex: default;kubernetes;https
  alerts.yml: |
    groups:
      # ================================================================
      # GOLDEN SIGNALS — Application Level (Google SRE methodology)
      # Latency, Traffic, Errors, Saturation
      # ================================================================
      - name: golden-signals.rules
        rules:
          - alert: HighErrorRate
            expr: |
              (
                sum(rate(http_requests_total{status_code=~"5.."}[5m])) by (service)
                /
                sum(rate(http_requests_total[5m])) by (service)
              ) > 0.05
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "High error rate on {{ $labels.service }}"
              description: "5xx errors > 5% for {{ $labels.service }}. Current: {{ $value | humanizePercentage }}"

          - alert: HighLatencyP95
            expr: |
              histogram_quantile(0.95,
                sum(rate(http_request_duration_seconds_bucket[5m])) by (le, service)
              ) > 1
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High p95 latency on {{ $labels.service }}"
              description: "95th percentile latency > 1s for {{ $labels.service }}. Current: {{ $value | humanizeDuration }}"

          - alert: HighLatencyP99
            expr: |
              histogram_quantile(0.99,
                sum(rate(http_request_duration_seconds_bucket[5m])) by (le, service)
              ) > 3
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Critical p99 latency on {{ $labels.service }}"
              description: "99th percentile latency > 3s for {{ $labels.service }}."

          - alert: TrafficDrop
            expr: |
              sum(rate(http_requests_total[5m])) by (service) < 0.1
              and
              sum(rate(http_requests_total[30m])) by (service) > 1
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Traffic dropped to near zero on {{ $labels.service }}"
              description: "Service {{ $labels.service }} was receiving traffic but dropped to near zero."

          - alert: HighCPUUsage
            expr: |
              (
                sum(rate(process_cpu_seconds_total[5m])) by (service)
                or
                sum(rate(process_cpu_user_seconds_total[5m]) + rate(process_cpu_system_seconds_total[5m])) by (service)
              ) * 100 > 80
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "CPU > 80% for {{ $labels.service }}"
              description: "Service {{ $labels.service }} using more than 80% of one CPU core."

      # ================================================================
      # KUBERNETES POD HEALTH
      # ================================================================
      - name: kubernetes-pods.rules
        rules:
          - alert: PodCrashLooping
            expr: rate(kube_pod_container_status_restarts_total[15m]) * 60 * 5 > 0
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is crash looping"
              description: "Pod has restarted more than once in the last 15 minutes."

          - alert: PodNotReady
            expr: |
              min_over_time(kube_pod_status_ready{condition="true"}[5m]) == 0
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} not ready for 10m"
              description: "Pod has been in not-ready state for more than 10 minutes."

          - alert: PodOOMKilled
            expr: kube_pod_container_status_last_terminated_reason{reason="OOMKilled"} > 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Container {{ $labels.container }} OOMKilled in {{ $labels.namespace }}/{{ $labels.pod }}"
              description: "Container ran out of memory and was killed. Increase memory limits."

          - alert: ContainerWaiting
            expr: kube_pod_container_status_waiting_reason{reason!="ContainerCreating"} > 0
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Container waiting: {{ $labels.reason }} in {{ $labels.namespace }}/{{ $labels.pod }}"
              description: "Container stuck in {{ $labels.reason }} state for 10+ minutes."

      # ================================================================
      # KUBERNETES DEPLOYMENTS
      # ================================================================
      - name: kubernetes-deployments.rules
        rules:
          - alert: DeploymentReplicasMismatch
            expr: |
              kube_deployment_spec_replicas != kube_deployment_status_replicas_available
            for: 10m
            labels:
              severity: critical
            annotations:
              summary: "Deployment {{ $labels.namespace }}/{{ $labels.deployment }} replicas mismatch"
              description: "Desired: {{ $value }} but available replicas don't match for 10+ minutes."

          - alert: DeploymentGenerationMismatch
            expr: |
              kube_deployment_status_observed_generation != kube_deployment_metadata_generation
            for: 10m
            labels:
              severity: critical
            annotations:
              summary: "Deployment {{ $labels.namespace }}/{{ $labels.deployment }} stuck rollout"
              description: "Deployment has not been rolled out successfully for 10+ minutes."

      # ================================================================
      # KUBERNETES NODES
      # ================================================================
      - name: kubernetes-nodes.rules
        rules:
          - alert: NodeNotReady
            expr: kube_node_status_condition{condition="Ready",status="true"} == 0
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Node {{ $labels.node }} is not ready"
              description: "Node has been NotReady for more than 5 minutes."

          - alert: NodeHighMemory
            expr: |
              (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 > 85
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Node {{ $labels.instance }} memory > 85%"
              description: "Node memory usage is {{ $value | humanize }}%."

          - alert: NodeHighCPU
            expr: |
              100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Node {{ $labels.instance }} CPU > 85%"
              description: "Node CPU usage is {{ $value | humanize }}%."

          - alert: NodeDiskPressure
            expr: kube_node_status_condition{condition="DiskPressure",status="true"} == 1
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Node {{ $labels.node }} has disk pressure"
              description: "Node is running out of disk space."

          - alert: NodeDiskFull
            expr: |
              (1 - node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay"}) * 100 > 90
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Node {{ $labels.instance }} disk > 90% full"
              description: "Filesystem {{ $labels.mountpoint }} is {{ $value | humanize }}% full."

      # ================================================================
      # PERSISTENT VOLUMES
      # ================================================================
      - name: kubernetes-storage.rules
        rules:
          - alert: PVCAlmostFull
            expr: |
              kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes * 100 > 80
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} is > 80% full"
              description: "Volume usage: {{ $value | humanize }}%. Consider expanding the PVC."

          - alert: PVCFull
            expr: |
              kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes * 100 > 95
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} is > 95% full"
              description: "Volume is nearly full. Expand immediately or data loss will occur."

      # ================================================================
      # KUBERNETES API SERVER
      # ================================================================
      - name: kubernetes-apiserver.rules
        rules:
          - alert: KubeAPIHighLatency
            expr: |
              histogram_quantile(0.99, sum(rate(apiserver_request_duration_seconds_bucket{verb!="WATCH"}[5m])) by (le)) > 3
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Kubernetes API server p99 latency > 3s"
              description: "API server is responding slowly. Check etcd and control plane health."

          - alert: KubeAPIErrorRate
            expr: |
              sum(rate(apiserver_request_total{code=~"5.."}[5m]))
              /
              sum(rate(apiserver_request_total[5m])) > 0.03
            for: 10m
            labels:
              severity: critical
            annotations:
              summary: "Kubernetes API server error rate > 3%"
              description: "API server returning 5xx errors at {{ $value | humanizePercentage }}."
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: devops-demo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - nodes/proxy
      - nodes/metrics
      - services
      - endpoints
      - pods
    verbs: ["get", "list", "watch"]
  - apiGroups: ["extensions", "networking.k8s.io"]
    resources:
      - ingresses
    verbs: ["get", "list", "watch"]
  - nonResourceURLs: ["/metrics", "/metrics/cadvisor"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: devops-demo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: devops-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: prometheus
      containers:
        - name: prometheus
          image: prom/prometheus:v2.55.0
          imagePullPolicy: IfNotPresent
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
          ports:
            - containerPort: 9090
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9090
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
            - name: prometheus-config
              mountPath: /etc/prometheus/alerts.yml
              subPath: alerts.yml
            - name: prometheus-data
              mountPath: /prometheus
      volumes:
        - name: prometheus-config
          configMap:
            name: prometheus-config
        - name: prometheus-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: devops-demo
spec:
  selector:
    app: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: 9090
