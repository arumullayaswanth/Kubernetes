apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-config
  namespace: devops-demo
type: Opaque
stringData:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m

    route:
      receiver: slack-notifications
      group_by: ["alertname", "service", "severity"]
      group_wait: 10s
      group_interval: 30s
      repeat_interval: 4h

    receivers:
      - name: slack-notifications
        slack_configs:
          - api_url: "${SLACK_WEBHOOK_URL}"
            channel: "#alerts"
            send_resolved: true
            title: "[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}"
            text: >-
              *Service:* {{ .CommonLabels.service | default "n/a" }}
              *Severity:* {{ .CommonLabels.severity | default "n/a" }}
              *Summary:* {{ .CommonAnnotations.summary }}
              *Description:* {{ .CommonAnnotations.description }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: devops-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
    spec:
      containers:
        - name: alertmanager
          image: prom/alertmanager:v0.28.0
          imagePullPolicy: IfNotPresent
          args:
            - --config.file=/etc/alertmanager/alertmanager.yml
            - --config.expand-env
          ports:
            - containerPort: 9093
          env:
            - name: SLACK_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: SLACK_WEBHOOK_URL
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9093
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9093
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          volumeMounts:
            - name: alertmanager-config
              mountPath: /etc/alertmanager/alertmanager.yml
              subPath: alertmanager.yml
      volumes:
        - name: alertmanager-config
          secret:
            secretName: alertmanager-config
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: devops-demo
spec:
  selector:
    app: alertmanager
  ports:
    - name: http
      port: 9093
      targetPort: 9093
