# ==============================================================================
# Grafana Dashboard Auto-Downloader ConfigMap
#
# Downloads production Kubernetes dashboards from grafana.com during pod init.
# Grafana's file-based provisioner auto-loads them — zero manual work.
#
# How it works:
#   1. initContainer runs this script before Grafana starts
#   2. Downloads JSON from grafana.com API by dashboard ID
#   3. Replaces datasource variables with our Prometheus UID
#   4. Saves to shared volume at /var/lib/grafana/dashboards/kubernetes/
#   5. Grafana starts and provisions them automatically from disk
# ==============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-downloader
  namespace: devops-demo
data:
  download-dashboards.sh: |
    #!/bin/sh
    set -e

    DEST="/var/lib/grafana/dashboards/kubernetes"
    mkdir -p "$DEST"

    download() {
      ID=$1
      NAME=$2

      echo "[*] Downloading dashboard ID=$ID name=$NAME ..."

      wget -q -T 10 -O "$DEST/${NAME}.json" \
        "https://grafana.com/api/dashboards/${ID}/revisions/latest/download" 2>/dev/null

      if [ $? -ne 0 ] || [ ! -s "$DEST/${NAME}.json" ]; then
        echo "    WARN: Failed to download dashboard $ID ($NAME), skipping"
        rm -f "$DEST/${NAME}.json"
        return
      fi

      # Replace common datasource variable patterns with our Prometheus UID
      sed -i 's/"uid": "${DS_PROMETHEUS}"/"uid": "prometheus"/g' "$DEST/${NAME}.json"
      sed -i 's/"uid": "$datasource"/"uid": "prometheus"/g' "$DEST/${NAME}.json"
      sed -i 's/${DS_PROMETHEUS}/prometheus/g' "$DEST/${NAME}.json"
      sed -i 's/\${datasource}/prometheus/g' "$DEST/${NAME}.json"

      echo "    OK: Saved $DEST/${NAME}.json ($(wc -c < "$DEST/${NAME}.json") bytes)"
    }

    echo "========================================"
    echo "Grafana Dashboard Downloader"
    echo "========================================"

    # Kubernetes Cluster Overview
    download 315 "k8s-cluster-monitoring"

    # Kubernetes Pods and Containers
    download 3662 "k8s-pods-containers"

    # Kubernetes Deployments
    download 1621 "k8s-deployments"

    # Kubernetes API Server
    download 12006 "k8s-apiserver"

    # Kubernetes Nodes (node-exporter full)
    download 6417 "k8s-nodes"

    # Kubernetes Namespace Monitoring
    download 10000 "k8s-namespace-monitoring"

    # Kubernetes Persistent Volumes
    download 13602 "k8s-persistent-volumes"

    # Kubernetes Networking
    download 15758 "k8s-networking"

    # NGINX Ingress Controller
    download 9614 "nginx-ingress"

    echo "========================================"
    echo "Done. Dashboards in $DEST:"
    ls -la "$DEST"
    echo "========================================"
